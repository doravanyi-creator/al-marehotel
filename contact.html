<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>Connect | AL-MARÉ Boutique Hotel</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Manrope:wght@300;400;600&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#8ba88e', brandDark: '#2d2a26', brandWhite: '#fafafa', brandBeige: '#f4f1ea' }, fontFamily: { sans: ['Manrope', 'sans-serif'], serif: ['Cormorant Garamond', 'serif'] } } } }
    </script>
</head>
<body class="bg-brandWhite text-brandDark">

<nav class="fixed w-full z-50 backdrop-blur-md bg-white/90 border-b border-stone-100">
    <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
        <a href="index.html" class="text-2xl font-serif font-bold tracking-widest">AL-MARÉ</a>
        <div class="hidden md:flex space-x-8 text-sm uppercase tracking-widest font-light">
            <a class="hover:text-primary transition-colors" href="index.html">Home</a>
            <a class="hover:text-primary transition-colors" href="experiences.html">Experiences</a>
            <a class="hover:text-primary transition-colors" href="rooms.html">Rooms</a>
            <a class="text-primary" href="contact.html">Contact</a>
        </div>
    </div>
</nav>

<main class="max-w-5xl mx-auto px-6 py-40">
    <div class="text-center mb-20">
        <h1 class="text-5xl md:text-7xl font-serif mb-6">Begin the Conversation</h1>
        <p class="text-stone-500 text-lg font-light italic">Your sanctuary is waiting for you.</p>
    </div>

    <div class="grid md:grid-cols-3 gap-16">
        <div class="space-y-8">
            <div>
                <h4 class="text-xs font-bold uppercase tracking-widest text-primary mb-2">Location</h4>
                <p class="text-stone-600 font-light">Sant Lluís, Menorca, Spain</p>
            </div>
            <div>
                <h4 class="text-xs font-bold uppercase tracking-widest text-primary mb-2">Inquiries</h4>
                <p class="text-stone-600 font-light">reservations@almarehotel.com</p>
                <p class="text-stone-600 font-light">+34 971 000 000</p>
            </div>
        </div>

        <div class="md:col-span-2">
            <form class="grid grid-cols-2 gap-6">
                <input type="text" placeholder="First Name" class="border-stone-200 p-4 rounded-custom col-span-1">
                <input type="text" placeholder="Last Name" class="border-stone-200 p-4 rounded-custom col-span-1">
                <input type="email" placeholder="Email Address" class="border-stone-200 p-4 rounded-custom col-span-2">
                <textarea placeholder="Tell us about your wellness goals..." class="border-stone-200 p-4 rounded-custom col-span-2 h-40"></textarea>
                <button class="bg-brandDark text-white py-4 px-8 rounded-custom uppercase text-xs font-bold tracking-widest col-span-2">Send Message</button>
            </form>
        </div>
    </div>
</main>

</body>
</html>
