<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Contact | AL-MARÉ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Manrope&display=swap');
        body { font-family: 'Manrope', sans-serif; background-color: #f4f1ea; }
        h1 { font-family: 'Cormorant Garamond', serif; }
    </style>
</head>
<body>
    <main class="max-w-2xl mx-auto pt-20 px-6">
        <h1 class="text-5xl mb-8 text-center">Concierge</h1>
        <form id="contact-form" class="bg-white p-8 shadow-sm space-y-4">
            <input type="text" id="name" name="name" placeholder="Full Name" required class="w-full p-3 border">
            <input type="email" id="email" name="email" placeholder="Email" required class="w-full p-3 border">
            <textarea id="message" name="message" placeholder="Your Message" required class="w-full p-3 border"></textarea>
            <button type="submit" id="submit-btn" class="w-full bg-[#2d2a26] text-white py-4 uppercase tracking-widest">Send to Concierge</button>
        </form>
    </main>

    <script>
        const form = document.getElementById("contact-form");
        const btn = document.getElementById("submit-btn");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            btn.innerText = "Sending...";
            btn.disabled = true;

            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                message: document.getElementById('message').value
            };

            try {
                const res = await fetch("/api/contact", {
                    method: "POST",
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) { window.location.href = "thank-you.html"; }
                else { throw new Error('Error'); }
            } catch (err) {
                alert("Submission failed. Check Vercel Logs.");
                btn.innerText = "Send to Concierge";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
